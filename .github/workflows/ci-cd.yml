name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_IMAGE: wallacestm/awslq
  WORKER_IMAGE: wallacestm/awslq-worker

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Static checks — lint + type-check (fast, no Docker needed)
  # ──────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── App ──────────────────────────────────────────────────────────────────
      - name: Install app deps
        working-directory: awlq-app
        run: bun install --frozen-lockfile

      - name: Generate Prisma client (app)
        working-directory: awlq-app
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
        run: bunx prisma generate

      - name: Lint app
        working-directory: awlq-app
        run: bun run lint

      # ── Worker ───────────────────────────────────────────────────────────────
      - name: Install worker deps
        working-directory: awlq-worker
        run: bun install --frozen-lockfile

      - name: Generate Prisma client (worker)
        working-directory: awlq-worker
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
        run: bunx prisma generate

      - name: Type-check worker
        working-directory: awlq-worker
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Build Docker images (only on push to main)
  # ──────────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-typecheck
    outputs:
      app-image: ${{ env.APP_IMAGE }}:${{ github.sha }}
      worker-image: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build app image (cached layers go to GHA cache)
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./awlq-app/Dockerfile
          push: false
          load: true
          tags: ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=awlq-app
          cache-to: type=gha,scope=awlq-app,mode=max

      # Build worker image
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./awlq-worker/Dockerfile
          push: false
          load: true
          tags: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=awlq-worker
          cache-to: type=gha,scope=awlq-worker,mode=max

      # Export images as tarballs so the test job can load them
      - name: Export images to tarballs
        run: |
          docker save ${{ env.APP_IMAGE }}:${{ github.sha }} -o /tmp/app-image.tar
          docker save ${{ env.WORKER_IMAGE }}:${{ github.sha }} -o /tmp/worker-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/app-image.tar
            /tmp/worker-image.tar
          retention-days: 1

  
  # ──────────────────────────────────────────────────────────────────────────────
  # 4. Push to Docker Hub 
  # ──────────────────────────────────────────────────────────────────────────────
  push-images:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/app-image.tar
          docker load -i /tmp/worker-image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push app image
        run: |
          docker tag ${{ env.APP_IMAGE }}:${{ github.sha }} ${{ env.APP_IMAGE }}:latest
          docker push ${{ env.APP_IMAGE }}:${{ github.sha }}
          docker push ${{ env.APP_IMAGE }}:latest

      - name: Tag and push worker image
        run: |
          docker tag ${{ env.WORKER_IMAGE }}:${{ github.sha }} ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      - name: Summary
        run: |
          echo "## Imagens publicadas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.APP_IMAGE }}\` | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.WORKER_IMAGE }}\` | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
