name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_IMAGE: wallacestm/awslq
  WORKER_IMAGE: wallacestm/awslq-worker

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # 1. Static checks — lint + type-check (fast, no Docker needed)
  # ──────────────────────────────────────────────────────────────────────────────
  lint-and-typecheck:
    name: Lint & Type-Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── App ──────────────────────────────────────────────────────────────────
      - name: Install app deps
        working-directory: awlq-app
        run: bun install --frozen-lockfile

      - name: Generate Prisma client (app)
        working-directory: awlq-app
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
        run: bunx prisma generate

      - name: Lint app
        working-directory: awlq-app
        run: bun run lint

      # ── Worker ───────────────────────────────────────────────────────────────
      - name: Install worker deps
        working-directory: awlq-worker
        run: bun install --frozen-lockfile

      - name: Generate Prisma client (worker)
        working-directory: awlq-worker
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
        run: bunx prisma generate

      - name: Type-check worker
        working-directory: awlq-worker
        run: bunx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────────────────
  # 2. Build Docker images (only on push to main)
  # ──────────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: lint-and-typecheck
    outputs:
      app-image: ${{ env.APP_IMAGE }}:${{ github.sha }}
      worker-image: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build app image (cached layers go to GHA cache)
      - name: Build app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./awlq-app/Dockerfile
          push: false
          load: true
          tags: ${{ env.APP_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=awlq-app
          cache-to: type=gha,scope=awlq-app,mode=max

      # Build worker image
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./awlq-worker/Dockerfile
          push: false
          load: true
          tags: ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=awlq-worker
          cache-to: type=gha,scope=awlq-worker,mode=max

      # Export images as tarballs so the test job can load them
      - name: Export images to tarballs
        run: |
          docker save ${{ env.APP_IMAGE }}:${{ github.sha }} -o /tmp/app-image.tar
          docker save ${{ env.WORKER_IMAGE }}:${{ github.sha }} -o /tmp/worker-image.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            /tmp/app-image.tar
            /tmp/worker-image.tar
          retention-days: 1

  # ──────────────────────────────────────────────────────────────────────────────
  # 3. Smoke-test images against real Postgres + Redis
  # ──────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: build-images

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awlq
          POSTGRES_PASSWORD: awlq
          POSTGRES_DB: awlq
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/app-image.tar
          docker load -i /tmp/worker-image.tar

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Run DB migrations against the CI Postgres before launching the app
      - name: Install app deps (for prisma CLI)
        working-directory: awlq-app
        run: bun install --frozen-lockfile

      - name: Run DB migrations
        working-directory: awlq-app
        env:
          DATABASE_URL: postgresql://awlq:awlq@localhost:5432/awlq
        run: bunx prisma migrate deploy

      # ── App smoke test ────────────────────────────────────────────────────────
      - name: Start app container
        run: |
          docker run -d \
            --name test-app \
            --network host \
            -e DATABASE_URL="postgresql://awlq:awlq@localhost:5432/awlq" \
            -e BETTER_AUTH_SECRET="ci-smoke-test-secret-minimum-32-chars-xx" \
            -e BETTER_AUTH_URL="http://localhost:3000" \
            -e SUPABASE_URL="https://placeholder.supabase.co" \
            -e SUPABASE_SERVICE_ROLE_KEY="ci-placeholder-supabase-service-key" \
            -e SUPABASE_ANON_KEY="ci-placeholder-anon-key" \
            -e NODE_ENV="production" \
            ${{ env.APP_IMAGE }}:${{ github.sha }}

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app on :3000..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "App did not respond in 60s"
          docker logs test-app
          exit 1

      - name: Check /api/health returns 200
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          echo "Health status: $STATUS"
          [ "$STATUS" = "200" ] || (docker logs test-app && exit 1)

      - name: Check landing page renders (HTTP 200)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/)
          echo "Landing status: $STATUS"
          [ "$STATUS" = "200" ] || (docker logs test-app && exit 1)

      - name: Dump app logs on failure
        if: failure()
        run: docker logs test-app

      # ── Worker smoke test ─────────────────────────────────────────────────────
      - name: Start worker container
        run: |
          docker run -d \
            --name test-worker \
            --network host \
            -e DATABASE_URL="postgresql://awlq:awlq@localhost:5432/awlq" \
            -e REDIS_URL="redis://localhost:6379" \
            -e NODE_ENV="production" \
            -e GEMINI_API_KEY="ci-placeholder-gemini-key" \
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}

      - name: Wait for worker to initialise (5s)
        run: sleep 5

      - name: Verify worker process is running
        run: |
          STATUS=$(docker inspect -f '{{.State.Status}}' test-worker)
          echo "Worker container status: $STATUS"
          [ "$STATUS" = "running" ] || (docker logs test-worker && exit 1)

      - name: Verify worker connected to Redis
        run: |
          LOGS=$(docker logs test-worker 2>&1)
          echo "$LOGS"
          # Worker logs "BullMQ" or "queue" on successful Redis connect
          echo "$LOGS" | grep -iE "queue|bull|ready|started|worker" || true

      - name: Dump worker logs on failure
        if: failure()
        run: docker logs test-worker

  # ──────────────────────────────────────────────────────────────────────────────
  # 4. Push to Docker Hub (only after smoke tests pass)
  # ──────────────────────────────────────────────────────────────────────────────
  push-images:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: smoke-test
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: /tmp

      - name: Load Docker images
        run: |
          docker load -i /tmp/app-image.tar
          docker load -i /tmp/worker-image.tar

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push app image
        run: |
          docker tag ${{ env.APP_IMAGE }}:${{ github.sha }} ${{ env.APP_IMAGE }}:latest
          docker push ${{ env.APP_IMAGE }}:${{ github.sha }}
          docker push ${{ env.APP_IMAGE }}:latest

      - name: Tag and push worker image
        run: |
          docker tag ${{ env.WORKER_IMAGE }}:${{ github.sha }} ${{ env.WORKER_IMAGE }}:latest
          docker push ${{ env.WORKER_IMAGE }}:${{ github.sha }}
          docker push ${{ env.WORKER_IMAGE }}:latest

      - name: Summary
        run: |
          echo "## Imagens publicadas" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | Tags |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.APP_IMAGE }}\` | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`${{ env.WORKER_IMAGE }}\` | \`latest\`, \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
