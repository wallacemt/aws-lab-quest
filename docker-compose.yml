services:
  postgres:
    image: postgres:16
    container_name: awlq-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: awlq
      POSTGRES_USER: awlq_user
      POSTGRES_PASSWORD: awlq_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awlq_user -d awlq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
