services:
  rt-awslq-worker:
    build:
      context: .
      dockerfile: awlq-worker/Dockerfile
    container_name: rt-awslq-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_POOL_MAX: "3"
      REDIS_URL: ${REDIS_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      NODE_ENV: production
      LOG_LEVEL: info
      WEAK_AREA_THRESHOLD: "0.60"
      WEAK_AREA_WINDOW_DAYS: "30"
      EMAIL_FROM: ${EMAIL_FROM}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_URL: ${APP_URL}
    networks:
     - rt-network
  rt-awslq-app:
    build:
      context: .
      dockerfile: awlq-app/Dockerfile
    container_name: rt-awslq-app
    restart: unless-stopped
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      GEMINI_SAFE_TOKENS_PER_MINUTE: 9_000
      GEMINI_MIN_CALL_INTERVAL_MS: 2_500
      GEMINI_OCR_MODEL: ${GEMINI_OCR_MODEL}
      DATABASE_URL: ${DATABASE_URL}

      EMAIL_FROM: ${EMAIL_FROM}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}

      # Better Auth
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL:  ${BETTER_AUTH_URL}
      APP_URL:  ${APP_URL}

      # Supabase (storage for avatars + badges)
      SUPABASE_URL:  ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY:  ${SUPABASE_SERVICE_ROLE_KEY}

      SUPABASE_ANON_KEY:  ${SUPABASE_ANON_KEY}
      POLLINATIONS_API_KEY:  ${POLLINATIONS_API_KEY}

      # Initial admin seed (optional)
      ADMIN_EMAIL:  ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME:  ${ADMIN_NAME}
    networks:
     - rt-network
    expose:
     - "3000"


networks:
  rt-network:
    external: true
